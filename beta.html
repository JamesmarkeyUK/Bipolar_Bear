<!DOCTYPE html>
<!-- Bipolar Bear Beta Landing Page © 2026 - All Rights Reserved -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bipolar Bear – Beta Access</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/icons/favicons/favicon.ico">
  <link rel="apple-touch-icon" href="/icons/favicons/apple-touch-icon.png">
  <meta name="theme-color" content="#ff9500">

  <!-- Shared helpers: load before any inline script that depends on isNative()/window.BB_FIREBASE_CONFIG. -->
  <script src="js/shared/platform.js"></script>
  <script src="js/shared/debug.js"></script>
  <script src="js/shared/brand-config.js"></script>
  <script src="js/shared/firebase-config.js"></script>

  <!-- Firebase SDK loaded inline in body, just before first use -->

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/beta.css">
</head>
<body>
<div id="iphone-frame">
  <div class="dynamic-island"></div>
  <div id="app-shell">
  <div id="scroll-view">
  <div class="container">
    <div class="logo-wrapper">
      <img src="images/logos/good_logo.png" alt="Bipolar Bear" class="logo-img">
    </div>
    <div class="logo-hint">
      <svg width="24" height="22" viewBox="0 0 24 22" fill="none">
        <path d="M 12,20 Q 8,10 12,2" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <polyline points="7,6 12,1 17,6" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>psst… click me!</span>
    </div>
    <p class="tagline">A mood journal and survival kit<br>for people living with bipolar disorder.</p>

    <!-- People helped counter -->
    <div id="peopleHelpedBeta" style="font-size:0.85em;color:rgba(255,255,255,0.85);margin-bottom:20px;min-height:1.2em;">
      <span id="betaHelpedCount" style="display:none;"></span>
    </div>

    <!-- Beta signup card -->
    <div class="card" id="signupCard">
      <div class="card-title" style="text-align: center;">Join the beta 🎉</div>

      <div id="signupForm">
        <label class="field-label" for="betaEmail">Email address</label>
        <input type="email" id="betaEmail" placeholder="you@example.com" autocomplete="email">

        <label class="field-label">I want to use Bipolar Bear on…</label>
        <div class="platform-row">
          <div class="platform-btn" data-platform="iPhone" onclick="selectPlatform(this)">
            <span class="plat-icon">🍎</span>iPhone
          </div>
          <div class="platform-btn" data-platform="Android" onclick="selectPlatform(this)">
            <span class="plat-icon">🤖</span>Android
          </div>
          <div class="platform-btn" data-platform="Web" onclick="selectPlatform(this)">
            <span class="plat-icon">🌐</span>Web
          </div>
        </div>

        <div class="error-msg" id="signupError"></div>

        <button class="submit-btn" onclick="submitSignup()">Request beta access →</button>
        
      </div>

      <div class="success-msg" id="signupSuccess">
        <div class="success-icon">🐻</div>
        <div class="success-title">Thanks! We'll let you know when it's ready to test.</div>
        <div class="success-sub">We really appreciate your interest in Bipolar Bear!</div>
      </div>
    </div>

     <br><br><h3>Already have access?</h3><br>

    <!-- Access card -->
    <div class="card">
      <label class="field-label" for="accessPw">Enter your access code</label>
      <div class="pw-row">
        <input type="password" id="accessPw" placeholder="Access code" onkeydown="if(event.key==='Enter')checkPassword()">
        <button class="pw-btn" onclick="checkPassword()">Enter →</button>
      </div>
      <div class="pw-error" id="pwError">Incorrect access code. Try again.</div>
    </div>

  </div>

  </div><!-- /#scroll-view -->
  </div><!-- /#app-shell -->
  <div class="home-indicator"></div>
</div><!-- /#iphone-frame -->

  <!-- Firebase SDK: loaded here so the page renders before these blocking scripts download -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script src="js/beta.js"></script>
</body>
</html>
